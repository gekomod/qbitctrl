name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-amd64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - run: |
        GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o qbitctrl-linux-amd64 ./cmd/server/
    - uses: actions/upload-artifact@v4
      with:
        name: amd64
        path: qbitctrl-linux-amd64

  build-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: '1.22'
    - run: |
        GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
          go build -ldflags="-s -w" -o qbitctrl-linux-arm64 ./cmd/server/
    - uses: actions/upload-artifact@v4
      with:
        name: arm64
        path: qbitctrl-linux-arm64

  release:
    needs: [build-amd64, build-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - run: |
        cp artifacts/amd64/qbitctrl-linux-amd64 .
        cp artifacts/arm64/qbitctrl-linux-arm64 .
        chmod +x qbitctrl-linux-*
        sha256sum qbitctrl-linux-* > checksums.txt
    - uses: softprops/action-gh-release@v1
      with:
        files: |
          qbitctrl-linux-amd64
          qbitctrl-linux-arm64
          checksums.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
